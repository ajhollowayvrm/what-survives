<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Survives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="title-screen" class="screen">
    <div class="title-inner">
      <p class="title-over">A PARTY-BASED JRPG — COMBAT PROTOTYPE</p>
      <h1>WHAT SURVIVES</h1>
      <p class="tagline">Read the weakness. Feed the gauge. Decide what the spirit becomes.</p>
      <button id="explore-btn" class="explore-btn">▸ Explore the Academy (demo)</button>
      <div id="battle-select"></div>
      <p class="hint">CTB turn order &middot; Rupture = opposite element, 2&times; damage + gauge &middot; at 100: Awaken or Amplify</p>
      <p class="hint alt-link"><a href="classic.html">text-mode client</a></p>
    </div>
  </div>

  <div id="overworld-screen" class="screen hidden">
    <div id="overworld-canvas"></div>
    <div id="ow-name"></div>
    <div id="ow-controls">Arrows / WASD to move &middot; Enter to interact</div>
    <div id="dialogue-box" class="hidden">
      <div id="dialogue-name"></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-hint">▸ Enter</div>
    </div>
    <button id="ow-exit-btn" title="Back to title">✕</button>
  </div>

  <div id="battle-screen" class="screen hidden">
    <div id="queue-bar">
      <span class="queue-label">NEXT</span>
      <div id="queue"></div>
      <button id="mute-btn" title="Toggle sound">🔊</button>
      <button id="speed-btn" title="Toggle animation speed">1&times;</button>
    </div>

    <div id="stage">
      <div id="battlefield"></div>
      <div id="log-panel"><div id="log"></div></div>
    </div>

    <div id="bottom">
      <div id="party-row"></div>
      <div id="command-panel">
        <div id="command-title"></div>
        <div id="command-menu"></div>
      </div>
    </div>

    <div id="banner" class="hidden"></div>
    <div id="cinematic" class="hidden">
      <div id="cin-name"></div>
      <div id="cin-cue"></div>
    </div>
    <div id="end-overlay" class="hidden">
      <div id="end-text"></div>
      <div id="end-buttons">
        <button id="retry-btn">Retry</button>
        <button id="title-btn">Return to Title</button>
      </div>
    </div>
    <div id="flash"></div>
  </div>

  <script src="js/vendor/phaser.min.js"></script>
  <script src="js/data/elements.js"></script>
  <script src="js/engine/formulas.js"></script>
  <script src="js/data/characters.js"></script>
  <script src="js/data/enemies.js"></script>
  <script src="js/data/combos.js"></script>
  <script src="js/data/maps.js"></script>
  <script src="js/engine/battle.js"></script>
  <script src="js/ui/ui.js"></script>
  <script src="js/ui/sfx.js"></script>
  <script src="js/ui/sprites.js"></script>
  <script src="js/ui/stage.js"></script>
  <script src="js/ui/stage-ui.js"></script>
  <script src="js/ui/dialogue.js"></script>
  <script src="js/ui/overworld.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
